[theme]
base = "light"
primaryColor = "#3462ED"
backgroundColor = "#F8FAFC"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1E293B"
font = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
headingFont = "Montserrat:https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap"
codeFont = "monospace"
baseRadius = "medium"
showWidgetBorder = true
showSidebarBorder = false

# Warna chart
chartCategoricalColors = [
    "#007BFF", # primary blue
    "#42c1b6", # purple
    "#5B7FFF", # soft blue
    "#1E3A8A", # dark blue
    "#7C93ED", # periwinkle
    "#2D3B87", # deep navy
    "#818CF8", # lavender
    "#6366F1", # indigo
]

# Light mode defaults
[theme.light]
primaryColor = "#3462ED"              # primary
backgroundColor = "#F8FAFC"           # bg konten
secondaryBackgroundColor = "#FFFFFF"  # bg card/widget
textColor = "#1E293B"                 # font
linkColor = "#3462ED"                 # primary
borderColor = "#E2E8F0"               # border tipis
codeBackgroundColor = "#F1F5F9"       # bg code
codeTextColor = "#1E293B"             # font

# Sidebar defaults
[theme.sidebar]
backgroundColor = "#121F45"           # navy
secondaryBackgroundColor = "#4748B0"  # ungu, hover/active
textColor = "#E2E8F0"                 # teks terang
primaryColor = "#3462ED"              # primary

